<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080,height=1920,initial-scale=1.0">
  <title>Swish — Fanatics Fest 2026 Starting Soon</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="stage">
    <!--
    <div class="topline">
      <div class="brand" id="brandText">SWISH</div>
      <div class="rule"></div>
      <div class="code" id="topCode">NYC / 2026</div>
    </div>
  -->
    <section class="header">
      <!---
      <div class="event">
        <span class="marker"></span>
        <span id="eventText">Fanatics Fest 2026</span>
      </div>
    -->

      <h1>
        <span id="titleLine1">Stream</span>
        <span class="accent" id="titleLine2">Starting Soon</span>
      </h1>
  <!--
      <div class="deck" id="deckText">New York City / Live from the floor</div>
    </section>
  -->

    <section class="camera wide">
      <div class="inner"></div>
      <div class="label" id="mainCamLabel">Main Floor</div>
    </section>

    <section class="count">
      <div class="count-label" id="countLabel">Going live at</div>
      <div class="timer" id="timer">12:00 PM</div>
    </section>

    <section class="info">
      <div class="info-row">
        <div class="info-label">Location</div>
        <div class="info-value" id="locationText">Fanatics Fest NYC</div>
      </div>
      <div class="info-row">
        <div class="info-label">On deck</div>
        <div class="info-value" id="onDeckText">Live breaks, rare pulls<br>& pack reveals</div>
      </div>
    </section>

    <section class="camera card">
      <div class="inner"></div>
      <div class="label" id="packCamLabel">Pack Cam</div>
    </section>

    <div class="micro" id="microText">
      Premium collectibles.<br>
      Live energy.<br>
      Only on Swish.
    </div>

    <div class="ticker">
      <div class="track" id="tickerTrack"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
